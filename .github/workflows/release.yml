name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: GitStack-windows
            archive_ext: zip
          - os: macos-latest
            artifact: GitStack-macos
            archive_ext: tar.gz
          - os: ubuntu-latest
            artifact: GitStack-linux
            archive_ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libxcb-cursor0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -v

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build with PyInstaller
        run: uv run pyinstaller GitStack.spec

      - name: Archive build (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/GitStack/* -DestinationPath ${{ matrix.artifact }}.zip
        shell: pwsh

      - name: Archive build (Unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.artifact }}.tar.gz -C dist GitStack

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.archive_ext }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "GitStack $tag" \
            --generate-notes \
            artifacts/GitStack-windows/GitStack-windows.zip \
            artifacts/GitStack-macos/GitStack-macos.tar.gz \
            artifacts/GitStack-linux/GitStack-linux.tar.gz
